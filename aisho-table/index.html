<script>

    // ============================================================
    // 基本データ / 画面状態

    let decks =
    [
        { class:"E",  name:"E" },
        { class:"R",  name:"R" },
        { class:"W",  name:"W" },
        { class:"D",  name:"D" },
        { class:"Ni", name:"Ni" },

    let matchup = [];

    let classIcon =
    {

        R  : "./images/icon_r.svg",

        Ni : "./images/icon_ni.svg",

    // ============================================================
    // IndexedDB保存関連
    // ============================================================

    // IndexedDB
let db = null;
let strCurrentDBName = "";

// IndexedDBを開く。初回起動時は保存用ストアを作成する。
function OpenDB(callback)
{

    let req = indexedDB.open("deckToolDB", 1);

    req.onupgradeneeded = function(e)
    {

        let objDB = e.target.result;

        if(!objDB.objectStoreNames.contains("data"))
        {
            objDB.createObjectStore("data", { keyPath:"id" });
        }
        else
        {

        }

    };

    req.onsuccess = function(e)
    {

        db = e.target.result;

        if(callback)
        {
            callback();
        }
        else
        {

        }

    };

}

// 指定名で現在のデッキ一覧と相性表を保存する。
function SaveDB(strName)
{

    if(!db)
    {
        return;
    }
    else
    {

        let tx = db.transaction("data", "readwrite");
        let store = tx.objectStore("data");

        store.put(
        {
            id : strName,
            decks : decks,
            matchup : matchup
        });

    }

}

// 指定名の保存データを読み込む。
function LoadDB(strName, callback)
{

    if(!db)
    {

        if(callback)
        {
            callback(false);
        }
        else
        {

        }

    }
    else
    {

        let tx = db.transaction("data", "readonly");
        let store = tx.objectStore("data");
        let req = store.get(strName);

        req.onsuccess = function()
        {

            if(req.result)
            {

                decks = req.result.decks;
                matchup = req.result.matchup;

                if(callback)
                {
                    callback(true);
                }
                else
                {

                }

            }
            else
            {

                if(callback)
                {
                    callback(false);
                }
                else
                {

                }

            }

        };

    }

}

// 保存済み表の名前一覧を取得する。
function GetDBNameList(callback)
{

    if(!db)
    {

        if(callback)
        {
            callback([]);
        }
        else
        {

        }

    }
    else
    {

        let tx = db.transaction("data", "readonly");
        let store = tx.objectStore("data");
        let req = store.getAllKeys();

        req.onsuccess = function()
        {

            if(callback)
            {
                callback(req.result || []);
            }
            else
            {

            }

        };

    }

}

// 新しい名前で保存する。保存後は現在の選択表として扱う。
function SaveAsDB()
{

    let strName = prompt("保存する表の名前を入力してください", strCurrentDBName);

    if(!strName)
    {

    }
    else
    {

        SaveDB(strName);
        strCurrentDBName = strName;
        RefreshDBSelect();
        alert("保存しました: " + strName);

    }

}

// 現在選択中の表へ上書き保存する。
function OverwriteDB()
{

    if(!strCurrentDBName)
    {

        alert("上書き保存する表が未選択です。先に「名前を付けて保存」または「読み込み」をしてください。");

    }
    else
    {

        SaveDB(strCurrentDBName);
        RefreshDBSelect();
        alert("上書き保存しました: " + strCurrentDBName);

    }

}

// 保存済み表プルダウンを最新状態へ更新する。
function RefreshDBSelect()
{

    GetDBNameList(function(arrNames)
    {

        let objSel = document.getElementById("dbSelect");

        objSel.innerHTML = "";

        let objEmpty = document.createElement("option");
        objEmpty.value = "";
        objEmpty.text = "保存済み表を選択";
        objSel.appendChild(objEmpty);

        for(let i = 0; i < arrNames.length; i++)
        {

            let strName = arrNames[i];
            let objOption = document.createElement("option");

            objOption.value = strName;
            objOption.text = strName;

            if(strCurrentDBName == strName)
            {
                objOption.selected = true;
            }
            else
            {

            }

            objSel.appendChild(objOption);

        }

        if(strCurrentDBName == "")
        {

        }
        else
        {
            objSel.value = strCurrentDBName;
        }

    });

}

// プルダウンで選択した保存済み表を読み込む。
function LoadSelectedDB()
{

    let objSel = document.getElementById("dbSelect");
    let strName = objSel.value;

    if(!strName)
    {

        alert("読み込む表を選択してください。");

    }
    else
    {

        LoadDB(strName, function(bOK)
        {

            if(!bOK)
            {

                alert("読み込み失敗");

            }
            else
            {

                strCurrentDBName = strName;
                ResizeMatrix();
                Draw();
                UpdateDeckSelectors();
                RefreshDBSelect();

            }

        });

    }

}

// プルダウンで選択した保存済み表を削除する。
function DeleteSelectedDB()
{

    let objSel = document.getElementById("dbSelect");
    let strName = objSel.value;

    if(!strName)
    {

        alert("削除する表を選択してください。");

    }
    else
    {

        if(!confirm(strName + " を削除しますか？"))
        {

        }
        else
        {

            let tx = db.transaction("data", "readwrite");
            let store = tx.objectStore("data");

            store.delete(strName);

            tx.oncomplete = function()
            {

                if(strCurrentDBName == strName)
                {
                    strCurrentDBName = "";
                }
                else
                {

                }

                RefreshDBSelect();

            };

        }

    }

}


// 自動保存用。現在選択中の表がある場合だけ上書き保存する。
function Save()
{

    if(!strCurrentDBName)
    {

    }
    else
    {

        SaveDB(strCurrentDBName);
        RefreshDBSelect();

    }

}

// 互換用の空関数。既存の呼び出しを壊さないために残している。
function Load(callback)
{

    if(callback)
    {
        callback();
    }
    else
    {

    }

}

    // ============================================================
    // デッキ表示 / 編集
    // ============================================================

    // デッキのアイコン付き表示HTMLを返す。
    function GetDeckHtml(iIndex)
    {

        let objDeck = decks[iIndex];
        let strIcon = classIcon[objDeck.class];
        let strText = objDeck.name;

        if(!strText)
        {
            strText = objDeck.class;
        }
        else
        {

        }

        let strHtml =
            `<span class="deckLabel">
            <img class="classIcon" src="${strIcon}" alt="${objDeck.class}">
            <span>${strText}</span>
            </span>`;

        return strHtml;

    }

    // 選択中のクラスでデッキを1件追加する。
    function AddDeck()
    {

        let strClass = document.getElementById("addClassSelect").value;
        let strName = strClass;

        if(!classIcon[strClass])
        {

        }
        else
        {

            decks.push(
                {
                    class : strClass,
                    name  : strName
                }
            );

            ResizeMatrix();
            Draw();
            Save();

        }

    }

    // 指定デッキを削除し、対応する行列も同時に削除する。
    function DeleteDeck(iIndex)
    {

        if(!confirm("削除しますか"))
        {

        }
        else
        {

            decks.splice(iIndex,1);

            matchup.splice(iIndex,1);

            for(let arrRow of matchup)
            {
                arrRow.splice(iIndex,1);
            }

            Draw();
            Save();

        }

    }

    // デッキ数に合わせて相性行列のサイズを揃える。
    function ResizeMatrix()
    {

        let iCount = decks.length;

        for(let iRow = 0; iRow < iCount; iRow++)
        {

            if(!matchup[iRow])
            {
                matchup[iRow] = [];
            }
            else
            {

            }

            for(let iCol = 0; iCol < iCount; iCol++)
            {

                if(matchup[iRow][iCol] == undefined)
                {
                    matchup[iRow][iCol] = null;
                }
                else
                {

                }

            }

        }

    }

    // デッキの表示順を上下に入れ替える。
    function MoveDeck(iIndex, iDir)
    {

        let iTarget = iIndex + iDir;

        if(iTarget < 0 || iTarget >= decks.length)
        {

        }
        else
        {

            [decks[iIndex],decks[iTarget]] = [decks[iTarget],decks[iIndex]];
            [matchup[iIndex],matchup[iTarget]] = [matchup[iTarget],matchup[iIndex]];

            for(let arrRow of matchup)
            {
                [arrRow[iIndex],arrRow[iTarget]] = [arrRow[iTarget],arrRow[iIndex]];
            }

            Draw();
            Save();

        }

    }

    // 相性表全体を再描画する。
    function Draw()
    {

        let objTable = document.getElementById("table");

        objTable.innerHTML = "";

        let strHeader = "<tr><th class='rowHeader'>使用デッキ↓対面デッキ→</th>";

        for(let iCol = 0; iCol < decks.length; iCol++)
        {
            strHeader += "<th class='deckHeader'>" + GetDeckHtml(iCol) + "</th>";
        }

        strHeader += "</tr>";

        objTable.innerHTML += strHeader;

        for(let iRow = 0; iRow < decks.length; iRow++)
        {

            let strRow = "<tr>";

            strRow += `<th class="rowHeader" onclick="EditDeck(${iRow})">
                    ${GetDeckHtml(iRow)}<br>
                    <button onclick="event.stopPropagation();MoveDeck(${iRow},-1)">↑</button>
                    <button onclick="event.stopPropagation();MoveDeck(${iRow},1)">↓</button>
                    <button onclick="event.stopPropagation();DeleteDeck(${iRow})">×</button>
                    </th>`;

            for(let iCol = 0; iCol < decks.length; iCol++)
            {

                if(iRow == iCol)
                {
                    strRow += "<td>—</td>";
                }
                else
                {

                    let v = matchup[iRow][iCol];
                    let strText = v == null ? "-" : v + "%";
                    strRow += `<td class="cell ${
                        v == 0 ? 'rainbow0' :
                        v == 10 ? 'rainbow10' :
                        v == 20 ? 'rainbow20' :
                        ''
                    }"
                    style="${v > 20 ? `background:${Color(v)}` : ''}"
                    onclick="EditCell(${iRow},${iCol},this)">
                    ${strText}
                    </td>`;

                }

            }

            strRow += "</tr>";

            objTable.innerHTML += strRow;

        }

      CheckMissing();
UpdateDeckSelectors();

    }

    // 行ヘッダーをクリックしたときにデッキ名を変更する。
    function EditDeck(iIndex)
    {

        let strName = prompt("デッキ名変更", decks[iIndex].name);

        if(!strName)
        {

        }
        else
        {

            decks[iIndex].name = strName;

            Draw();
            Save();

        }
UpdateDeckSelectors();
    }

// セルをプルダウン編集モードに切り替える。
function EditCell(iRow, iCol, objCell)
{

    let v = matchup[iRow][iCol];
    let strOldText = v == null ? "-" : v + "%";
    let bChanged = false;

    if(fnRestoreCell == null)
    {

    }
    else
    {

        fnRestoreCell();

    }

    objCell.innerHTML = "";

    let objSel = document.createElement("select");

    let objNone = document.createElement("option");
    objNone.value = "";
    objNone.text = "-";

    if(v == null)
    {
        objNone.selected = true;
    }
    else
    {

    }

    objSel.appendChild(objNone);

    for(let iPercent = 0; iPercent <= 100; iPercent += 10)
    {

        let objOption = document.createElement("option");

        objOption.value = iPercent;
        objOption.text = iPercent + "%";

        if(iPercent == v)
        {
            objOption.selected = true;
        }
        else
        {

        }

        objSel.appendChild(objOption);

    }

    fnRestoreCell = function()
    {

        if(bChanged)
        {

        }
        else
        {

            objCell.innerHTML = strOldText;

        }

        objEditCell = null;
        fnRestoreCell = null;

    };

    objSel.onchange = function()
    {

        bChanged = true;

        if(this.value == "")
        {

            matchup[iRow][iCol] = null;
            matchup[iCol][iRow] = null;

        }
        else
        {

            let iValue = parseInt(this.value);

            matchup[iRow][iCol] = iValue;
            matchup[iCol][iRow] = 100 - iValue;

        }

        objEditCell = null;
        fnRestoreCell = null;

        Draw();
        Save();

    };
objSel.onclick = function(event)
{
    event.stopPropagation();
};

objSel.onmousedown = function(event)
{
    event.stopPropagation();
};
objCell.appendChild(objSel);

objEditCell = objCell;
}

// 勝率に応じた背景色を返す。
function Color(v)
{

    function MixColor(iR1, iG1, iB1, iR2, iG2, iB2, dRate)
    {
        let iR = Math.floor(iR1 + (iR2 - iR1) * dRate);
        let iG = Math.floor(iG1 + (iG2 - iG1) * dRate);
        let iB = Math.floor(iB1 + (iB2 - iB1) * dRate);

        return `rgb(${iR},${iG},${iB})`;
    }

    if(v == null)
    {
        return "white";
    }
    else
    {

    }

    if(v <= 20)
    {
        return "white";
    }
    else
    {

    }

    if(v > 20 && v <= 40)
    {
        let dRate = (v - 20) / 20;
        return MixColor(255, 255, 255, 140, 230, 255, dRate);
    }
    else
    {

    }

    if(v > 40 && v < 50)
    {
        let dRate = (v - 40) / 10;
        return MixColor(140, 230, 255, 120, 255, 120, dRate);
    }
    else
    {

    }

    if(v == 50)
    {
        return "rgb(120,255,120)";
    }
    else
    {

    }

    if(v > 50 && v <= 60)
    {
        let dRate = (v - 50) / 10;
        return MixColor(120, 255, 120, 255, 140, 140, dRate);
    }
    else
    {

    }

    if(v > 60)
    {
        let dRate = (v - 60) / 40;
        return MixColor(255, 140, 140, 255, 0, 0, dRate);
    }
    else
    {

    }

    return "white";
}

    // 凡例を生成する。
    function CreateLegend()
    {

        let objLegend = document.getElementById("legend");
        objLegend.innerHTML = "";

        for(let iPercent = 100; iPercent >= 0; iPercent -= 10)
        {

            let objDiv = document.createElement("div");

            objDiv.innerText = iPercent + "%";

            if(iPercent == 20)
            {
                objDiv.className = "rainbow20";
            }
            else
            {
                if(iPercent == 10)
                {
                    objDiv.className = "rainbow10";
                }
                else

    // 現在の表をCSVとして出力する。
    function ExportCSV()
    {

        let strName = prompt("CSVファイル名を入力", "matchup");

        if(!strName)
        {

        }
        else
        {

            let strCsv = "";

            strCsv += "," + decks.map(function(objDeck)
            {
                return objDeck.class + ":" + objDeck.name;
            }).join(",") + "\n";

            for(let iRow = 0; iRow < decks.length; iRow++)
            {

                let arrRow = [decks[iRow].class + ":" + decks[iRow].name];

                for(let iCol = 0; iCol < decks.length; iCol++)
                {
                    arrRow.push(matchup[iRow][iCol] ?? "");
                }

                strCsv += arrRow.join(",") + "\n";

            }

            let objBlob = new Blob([strCsv]);
            let objLink = document.createElement("a");

            objLink.href = URL.createObjectURL(objBlob);
            objLink.download = strName + ".csv";
            objLink.click();

        }

    }

    // CSVを読み込み、現在の表に反映する。
    function ImportCSV(event)
    {

        let objFile = event.target.files[0];

        if(!objFile)
        {

        }
        else
        {

            let objReader = new FileReader();

            objReader.onload = function()
            {

                let arrLines = objReader.result.trim().split("\n");

                decks = arrLines[0].split(",").slice(1).map(function(strValue)
                {
                    let arrParts = strValue.split(":");
                    let objDeck =
                    {
                        class : "E",
                        name : strValue
                    };

                    if(arrParts.length >= 2)
                    {
                        objDeck =
                        {
                            class : arrParts[0],
                            name : arrParts.slice(1).join(":")
                        };
                    }
                    else
                    {

                    }

                    return objDeck;
                });

                matchup = [];

                for(let iRow = 1; iRow < arrLines.length; iRow++)
                {

                    let arrCols = arrLines[iRow].split(",");

                    matchup[iRow - 1] = [];

                    for(let iCol = 1; iCol < arrCols.length; iCol++)
                    {

                        let strValue = arrCols[iCol];

                        if(strValue === "")
                        {
                            matchup[iRow - 1][iCol - 1] = null;
                        }
                        else
                        {
                            matchup[iRow - 1][iCol - 1] = parseInt(strValue);
                        }

                    }

                }

                ResizeMatrix();
                Draw();
                strCurrentDBName = "";
                RefreshDBSelect();
                Save();

            };

            objReader.readAsText(objFile);

        }

    }

{

    let arrEnemy = [];

    for(let iEnemy = 0; iEnemy < decks.length; iEnemy++)

        {

            if(decks[iEnemy].class == strClass2)
            {
                bMatch = true;
            }
            else
            {

            }

        }

        if(bMatch)
        {
            arrEnemy.push(iEnemy);
        }
        else
        {

        }

    }

    let strOut = "";

    if(arrEnemy.length == 0)
    {

        strOut = "該当する相手候補デッキがありません。";

    }
    else
    {

        let arrScores = [];

        for(let iMe = 0; iMe < decks.length; iMe++)
        {

            let dTotal = 0;
            let iCount = 0;

            for(let i = 0; i < arrEnemy.length; i++)
            {

                let iEnemy = arrEnemy[i];

                if(iMe == iEnemy)
                {

                }
                else
                {

                    let v = matchup[iMe][iEnemy];

                    if(v == null)
                    {

                    }
                    else
                    {

                        dTotal += v;
                        iCount++;

                    }

                }

            }

            if(iCount > 0)
            {

                arrScores.push(
                    {
                        html :
                            `<span class="deckLabel">
                            <img class="classIcon" src="${classIcon[decks[iMe].class]}" alt="${decks[iMe].class}">
                            <span>${decks[iMe].name}</span>
                            </span>`,
                        score : dTotal / iCount
                    }
                );

            }
            else
            {

            }

        }

        arrScores.sort(function(a,b)
        {
            return b.score - a.score;
        });

        if(arrScores.length == 0)
        {

            strOut = "計算に必要な相性データがありません。";

        }
        else
        {

            strOut += "推奨先出し<br><br>";

            strOut += `<table class='resultTable'>`;
            strOut += "<tr><th>順位</th><th class='resultDeckCell'>デッキ</th><th>期待勝率</th></tr>";

            let iLimit = Math.min(10, arrScores.length);

            for(let iIndex = 0; iIndex < iLimit; iIndex++)
            {

                let objScore = arrScores[iIndex];

                strOut += `<tr>
                        <td>${iIndex + 1}</td>
                        <td class="resultDeckCell">${objScore.html}</td>
                        <td>${objScore.score.toFixed(1)}%</td>
                        </tr>`;

            }

            strOut += "</table>";

            strOut += "<br>相手候補<br>";

            for(let i = 0; i < arrEnemy.length; i++)
            {

                let iEnemy = arrEnemy[i];

                strOut += `${GetDeckHtml(iEnemy)}<br>`;

            }

        }

    }

    document.getElementById("bestpairs").innerHTML = strOut;
